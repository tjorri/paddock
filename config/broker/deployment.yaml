apiVersion: apps/v1
kind: Deployment
metadata:
  name: broker
  namespace: system
  labels:
    app.kubernetes.io/name: paddock
    app.kubernetes.io/component: broker
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paddock
      app.kubernetes.io/component: broker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paddock
        app.kubernetes.io/component: broker
    spec:
      serviceAccountName: broker
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: broker
          # Literal here; hack/gen-helm-chart.sh rewrites this into a
          # {{ .Values.brokerImage ... }} template when rendering the chart.
          image: paddock-broker:dev
          command: ["/broker"]
          args:
            - --listen-address=:8443
            - --health-probe-bind-address=:8081
            - --cert-dir=/etc/paddock-broker/tls
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: probes
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tls-cert
              mountPath: /etc/paddock-broker/tls
              readOnly: true
      volumes:
        - name: tls-cert
          secret:
            secretName: broker-serving-cert
            defaultMode: 0o420
