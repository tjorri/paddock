---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: brokerpolicies.paddock.dev
spec:
  group: paddock.dev
  names:
    kind: BrokerPolicy
    listKind: BrokerPolicyList
    plural: brokerpolicies
    shortNames:
    - bp
    singular: brokerpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.appliesToTemplates
      name: Templates
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .spec.egressDiscovery.expiresAt
      name: Discovery-Until
      priority: 1
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BrokerPolicy declares the capabilities the broker will back for one
          or more templates in a namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BrokerPolicySpec declares, for one namespace, which capabilities the
              broker is willing to back for a set of templates. See spec 0003.
            properties:
              appliesToTemplates:
                description: |-
                  AppliesToTemplates is a list of template name globs this policy
                  will back. "*" matches any template name; explicit names tighten
                  the operator-consent story. At least one entry is required.
                items:
                  type: string
                minItems: 1
                type: array
              egressDiscovery:
                description: |-
                  EgressDiscovery, when present, opens a time-bounded window during
                  which denied egress is allowed-but-logged. Admission rejects
                  expiresAt values in the past or more than 7 days in the future.
                  After the window closes, the BrokerPolicy reconciler sets
                  DiscoveryExpired=True and the HarnessRun admission webhook
                  rejects new runs governed by this policy until the operator
                  updates expiresAt or removes the field. See spec 0003 §3.6.
                properties:
                  accepted:
                    description: |-
                      Accepted must be true; setting it documents that the operator
                      acknowledges egress will be allowed-but-logged rather than blocked
                      for the duration of ExpiresAt.
                    type: boolean
                  expiresAt:
                    description: |-
                      ExpiresAt closes the discovery window. Admission rejects values
                      in the past or more than 7 days in the future.
                    format: date-time
                    type: string
                  reason:
                    description: |-
                      Reason explains why a discovery window is necessary instead of
                      iterating per-denial via paddock policy suggest.
                    maxLength: 500
                    minLength: 20
                    type: string
                required:
                - accepted
                - expiresAt
                - reason
                type: object
              grants:
                description: Grants enumerates the capabilities this policy is willing
                  to back.
                properties:
                  credentials:
                    items:
                      description: |-
                        CredentialGrant supplies a provider + configuration for one logical
                        credential name declared by templates' requires.credentials[*].name.
                      properties:
                        name:
                          type: string
                        provider:
                          description: ProviderConfig selects a broker provider and
                            supplies its configuration.
                          properties:
                            appId:
                              description: |-
                                AppID is the GitHub App numeric ID (GitHubApp only). Must be a
                                positive integer of at most 20 digits when set; required for
                                GitHubApp providers (admission rejects empty for that kind).
                              pattern: ^[1-9][0-9]{0,19}$
                              type: string
                            deliveryMode:
                              description: |-
                                DeliveryMode is required for UserSuppliedSecret and forbidden for
                                all other kinds.
                              properties:
                                inContainer:
                                  description: |-
                                    InContainerDelivery opts the user into delivering the real secret
                                    value to the agent container's environment.
                                  properties:
                                    accepted:
                                      description: Accepted must be true.
                                      type: boolean
                                    reason:
                                      description: Reason explains why in-container
                                        delivery is necessary.
                                      maxLength: 500
                                      minLength: 20
                                      type: string
                                  required:
                                  - accepted
                                  - reason
                                  type: object
                                proxyInjected:
                                  description: |-
                                    ProxyInjectedDelivery describes how the proxy should substitute the
                                    real secret value onto outbound requests.
                                  properties:
                                    basicAuth:
                                      description: BasicAuthSubstitution sets HTTP
                                        Basic authentication.
                                      properties:
                                        username:
                                          type: string
                                      required:
                                      - username
                                      type: object
                                    header:
                                      description: Exactly one of Header / QueryParam
                                        / BasicAuth must be set.
                                      properties:
                                        name:
                                          type: string
                                        valuePrefix:
                                          description: ValuePrefix is prepended to
                                            the secret value (e.g. "Bearer ").
                                          type: string
                                      required:
                                      - name
                                      type: object
                                    hosts:
                                      description: |-
                                        Hosts are the destination hostnames the proxy will substitute on.
                                        A leading "*." permits any subdomain. At least one entry required.
                                      items:
                                        type: string
                                      minItems: 1
                                      type: array
                                    queryParam:
                                      description: QueryParamSubstitution rewrites
                                        one URL query parameter.
                                      properties:
                                        name:
                                          type: string
                                      required:
                                      - name
                                      type: object
                                  required:
                                  - hosts
                                  type: object
                              type: object
                            hosts:
                              description: |-
                                Hosts optionally overrides the destination host list used for
                                proxy substitution, for built-in providers (AnthropicAPI,
                                GitHubApp, PATPool). For UserSuppliedSecret with proxyInjected
                                delivery, hosts live under deliveryMode.proxyInjected instead and
                                this field must not be set.
                              items:
                                type: string
                              type: array
                            installationId:
                              description: |-
                                InstallationID is the GitHub App installation ID (GitHubApp only).
                                Must be a positive integer of at most 20 digits when set;
                                required for GitHubApp providers.
                              pattern: ^[1-9][0-9]{0,19}$
                              type: string
                            kind:
                              description: Kind names the provider implementation.
                              enum:
                              - UserSuppliedSecret
                              - AnthropicAPI
                              - GitHubApp
                              - PATPool
                              type: string
                            rotationSeconds:
                              description: RotationSeconds optionally overrides the
                                provider's default TTL.
                              format: int32
                              minimum: 60
                              type: integer
                            secretRef:
                              description: SecretRef identifies the Secret backing
                                this provider.
                              properties:
                                key:
                                  type: string
                                name:
                                  type: string
                              required:
                              - key
                              - name
                              type: object
                          required:
                          - kind
                          type: object
                      required:
                      - name
                      - provider
                      type: object
                    type: array
                  egress:
                    items:
                      description: |-
                        EgressGrant permits an upstream destination. Pure allow/deny; the
                        substituteAuth flag from v0.3 is removed — substitution is driven by
                        credential grants' deliveryMode and built-in providers' Hosts defaults.
                      properties:
                        host:
                          type: string
                        ports:
                          items:
                            format: int32
                            type: integer
                          type: array
                      required:
                      - host
                      type: object
                    type: array
                  gitRepos:
                    items:
                      description: GitRepoGrant permits a gitforge token scoped to
                        one repo.
                      properties:
                        access:
                          default: read
                          enum:
                          - read
                          - write
                          type: string
                        owner:
                          type: string
                        repo:
                          type: string
                      required:
                      - owner
                      - repo
                      type: object
                    type: array
                  runs:
                    description: |-
                      Runs declares run-time interaction capabilities (interactive prompt
                      submission, shell open). Independent of Credentials, Egress,
                      GitRepos.
                    properties:
                      interact:
                        description: |-
                          Interact enables prompt submission and event streaming for runs
                          matching this policy. Default false. Required for spec.mode:
                          Interactive admission.
                        type: boolean
                      shell:
                        description: |-
                          Shell, when non-nil, enables shell-session open against runs
                          matching this policy. Nil means denied.
                        properties:
                          allowedPhases:
                            description: |-
                              AllowedPhases restricts which run phases can host a shell session.
                              Default (when empty): all phases that have a pod (Running, Idle,
                              Succeeded, Failed, Cancelled).
                            items:
                              description: HarnessRunPhase is the lifecycle phase
                                of a HarnessRun.
                              enum:
                              - Pending
                              - Running
                              - Idle
                              - Succeeded
                              - Failed
                              - Cancelled
                              type: string
                            type: array
                          command:
                            description: |-
                              Command overrides the default shell-discovery (try /bin/bash, fall
                              back to /bin/sh). When set, broker requires this exact path to
                              exist in the target container; otherwise the open is rejected.
                            items:
                              type: string
                            type: array
                          recordTranscript:
                            description: |-
                              RecordTranscript captures the WebSocket bytestream to
                              <workspace>/.paddock/shell/<session-id>.log when true. Default
                              false — recording doubles disk I/O and stores potentially-sensitive
                              output.
                            type: boolean
                          target:
                            default: agent
                            description: Target is which container the broker exec's
                              into.
                            enum:
                            - agent
                            - adapter
                            type: string
                        type: object
                    type: object
                type: object
              interception:
                description: |-
                  Interception selects the egress-proxy interception mode for runs
                  governed by this policy. Absent the field admission defaults to
                  requiring transparent mode; a run whose namespace PSA forbids
                  NET_ADMIN (baseline/restricted) then fails closed rather than
                  silently falling back to cooperative. Set
                  spec.interception.cooperativeAccepted to opt into the weaker mode
                  with a written reason.
                properties:
                  cooperativeAccepted:
                    description: |-
                      CooperativeAcceptedInterception opts the BrokerPolicy into cooperative
                      interception, which is weaker than transparent because an agent can
                      unset HTTPS_PROXY to bypass it. The user documents why that weakening
                      is acceptable in Reason.
                    properties:
                      accepted:
                        description: Accepted must be true.
                        type: boolean
                      reason:
                        description: |-
                          Reason explains why cooperative interception is necessary instead
                          of transparent. Typical reasons include cluster PSA=restricted
                          without a node-level DaemonSet proxy.
                        maxLength: 500
                        minLength: 20
                        type: string
                    required:
                    - accepted
                    - reason
                    type: object
                  transparent:
                    description: |-
                      TransparentInterception is an empty marker that selects transparent
                      mode. No knobs are required; it exists as a distinct sub-field so
                      admission can enforce exactly-one-of semantics with cooperativeAccepted.
                    type: object
                type: object
            required:
            - appliesToTemplates
            - grants
            type: object
          status:
            description: BrokerPolicyStatus reports the observed state of a BrokerPolicy.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
