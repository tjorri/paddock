apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: paddock
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: paddock
    app.kubernetes.io/managed-by: kustomize
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: paddock
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: paddock
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
          # The collector image is a separate binary that ships alongside
          # the manager; the two version in lockstep. hack/gen-helm-chart.sh
          # rewrites this literal into a {{ .Values.collectorImage ... }}
          # template when generating the Helm chart.
          - --collector-image=paddock-collector:dev
          # HarnessRun.status.recentEvents cap (ADR-0007). Literal here;
          # hack/gen-helm-chart.sh substitutes it with .Values.recentEventsCap
          # when rendering the Helm chart.
          - --recent-events-cap=50
          # AuditEvent retention window (ADR-0016). Literal here; the
          # chart generator substitutes .Values.auditRetentionDays.
          - --audit-retention-days=30
          # Broker endpoint + auth (M3). Empty endpoint disables broker
          # integration (appropriate for envtest or installs without a
          # broker); the chart generator wires the default to the
          # in-cluster service when broker.enabled is true.
          - --broker-endpoint=https://paddock-broker.paddock-system.svc:8443
          - --broker-token-path=/var/run/secrets/paddock-broker/token
          - --broker-ca-path=/etc/paddock-broker/ca/ca.crt
          # Proxy sidecar wiring (M4, ADR-0013, F-18 / Phase 2f). The
          # chart generator rewrites --proxy-image into a
          # .Values.proxyImage template; --proxy-ca-cluster-issuer-name
          # points at the cert-manager ClusterIssuer (kind: CA) that
          # signs per-run intermediate CAs.
          - --proxy-image=paddock-proxy:dev
          - --proxy-ca-cluster-issuer-name=paddock-proxy-ca-issuer
          - --proxy-allow=
          # Transparent-mode init container (ADR-0013 §7.2). Only
          # injected when the run's namespace PSA admits NET_ADMIN.
          # Empty disables transparent mode entirely.
          - --iptables-init-image=paddock-iptables-init:dev
          # paddock-home-init image (creates HOME inside the workspace
          # PVC). Empty falls back to the in-source busybox:1.36
          # default; operators in air-gapped clusters should override
          # via the chart's homeInitImage value.
          - --home-init-image=
          # Per-run NetworkPolicy enforcement (ADR-0013 §7.4).
          # auto: probe kube-system for a known NP-capable CNI.
          # on: always emit; off: never emit.
          - --networkpolicy-enforce=auto
          # Broker-CA copy source (M7). The reconciler copies ca.crt
          # from this Secret into a per-run <run>-broker-ca Secret so
          # the proxy sidecar can verify the broker's TLS cert.
          - --broker-ca-secret-name=broker-serving-cert
          - --broker-ca-secret-namespace=paddock-system
        image: controller:latest
        name: manager
        ports: []
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
          - name: broker-token
            mountPath: /var/run/secrets/paddock-broker
            readOnly: true
          - name: broker-ca
            mountPath: /etc/paddock-broker/ca
            readOnly: true
      volumes:
        - name: broker-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: paddock-broker
                  expirationSeconds: 3600
        - name: broker-ca
          secret:
            secretName: broker-serving-cert
            optional: true
            items:
              - key: ca.crt
                path: ca.crt
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
