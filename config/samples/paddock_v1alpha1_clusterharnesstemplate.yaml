apiVersion: paddock.dev/v1alpha1
kind: ClusterHarnessTemplate
metadata:
  labels:
    app.kubernetes.io/name: paddock
    app.kubernetes.io/managed-by: kustomize
  name: echo-default
spec:
  harness: echo
  # Built locally via `make image-echo` and loaded into Kind by Tilt.
  image: paddock-echo:dev
  command:
    - /usr/local/bin/paddock-echo
  runtime:
    # Built locally via `make image-adapter-echo`.
    image: paddock-adapter-echo:dev
  defaults:
    model: none
    timeout: 30s
  workspace:
    required: true
    mountPath: /workspace
