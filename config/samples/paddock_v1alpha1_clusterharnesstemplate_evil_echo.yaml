  command: ["/usr/local/bin/evil-echo"]
  # TG-25a (Phase 2g, F-25): smoke-check that the suite still runs end-to-end
  # with the new Phase 2g code. The load-bearing idle-timeout assertion lives
  # in unit tests (TestProxy_BytesShuttleIdleTimeout, TestSubstituteLoop_IdleTimeout).
  # The e2e here just runs a benign harness flag and asserts the run reaches
  # terminal phase cleanly with the new code path.
  args:
    - "--probe-env-override"
  eventAdapter:
    image: paddock-adapter-echo:dev
    imagePullPolicy: IfNotPresent
  requires:
    egress:
      - host: example.com
        ports: [443]
  defaults:
    timeout: 60s
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  workspace:
    required: true
    mountPath: /workspace
