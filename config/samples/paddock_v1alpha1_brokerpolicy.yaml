# Example BrokerPolicy granting a claude-code-style template the
# capabilities it declares via spec.requires.
#
# See ADR-0014 (capability model) and spec 0002 §8.
apiVersion: paddock.dev/v1alpha1
kind: BrokerPolicy
metadata:
  name: allow-claude-code
  namespace: default
spec:
  appliesToTemplates: ["claude-code"]
  denyMode: block
  brokerFailureMode: Closed
  grants:
    credentials:
      - name: ANTHROPIC_API_KEY
        provider:
          kind: AnthropicAPI
          secretRef:
            name: anthropic-api
            key: key
    egress:
      - host: api.anthropic.com
        ports: [443]
        substituteAuth: true
    gitRepos: []
