# Example BrokerPolicy granting a claude-code-style template a
# gitforge credential backed by a GitHub App.
#
# The operator installs a GitHub App (https://docs.github.com/apps) and
# stores its private key in a Secret. The broker uses App ID + the
# installation's numeric ID + the private key to mint short-lived
# installation tokens scoped to the gitRepos list below.
#
# See ADR-0015 (Provider interface) and spec 0002 §6.3.
apiVersion: v1
kind: Secret
metadata:
  name: paddock-github-app
  namespace: default
type: Opaque
stringData:
  # Paste the .pem contents — a PKCS#1 ("RSA PRIVATE KEY") or PKCS#8
  # ("PRIVATE KEY") block. GitHub's App installer ships PKCS#1.
  private-key: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_ME
    -----END RSA PRIVATE KEY-----
---
apiVersion: paddock.dev/v1alpha1
kind: BrokerPolicy
metadata:
  name: allow-claude-code-github
  namespace: default
spec:
  appliesToTemplates: ["claude-code"]
  denyMode: block
  brokerFailureMode: Closed
  grants:
    credentials:
      - name: GITHUB_TOKEN
        provider:
          kind: GitHubApp
          # App ID from https://github.com/settings/apps/<app>
          appId: "123456"
          # Installation ID from
          # https://github.com/organizations/<org>/settings/installations
          installationId: "78901234"
          secretRef:
            name: paddock-github-app
            key: private-key
    # Scopes the issued installation tokens. Double-gated against the
    # App's actually-installed repo set by GitHub at mint time.
    gitRepos:
      - owner: my-org
        repo: backend-service
        access: write
      - owner: my-org
        repo: shared-libs
        access: read
    # git HTTPS to github.com flows through the proxy with
    # substituteAuth=true so upstream never sees the Paddock bearer.
    egress:
      - host: github.com
        ports: [443]
        substituteAuth: true
      - host: api.github.com
        ports: [443]
        substituteAuth: true
