# Example BrokerPolicy using the UserSuppliedSecret provider with
# in-container delivery — the broker reads the referenced Secret and
# plumbs the raw value into the run container's environment. See
# spec 0003 §3.1 and ADR-0015.
apiVersion: paddock.dev/v1alpha1
kind: BrokerPolicy
metadata:
  name: allow-echo-usersecret
  namespace: default
spec:
  appliesToTemplates: ["echo"]
  grants:
    credentials:
      - name: DEMO_TOKEN
        provider:
          kind: UserSuppliedSecret
          secretRef:
            name: demo-token
            key: token
          deliveryMode:
            inContainer:
              accepted: true
              reason: "Demo credential plumbed directly into the echo run container for the example scenario."
