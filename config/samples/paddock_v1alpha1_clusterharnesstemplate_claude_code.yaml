apiVersion: paddock.dev/v1alpha1
kind: ClusterHarnessTemplate
metadata:
  labels:
    app.kubernetes.io/name: paddock
    app.kubernetes.io/managed-by: kustomize
  name: claude-code
spec:
  harness: claude-code
  # Built locally via `make image-claude-code` and loaded into Kind by Tilt.
  # Replace with a published image reference for production installs.
  image: paddock-claude-code:dev
  command:
    - /usr/local/bin/paddock-claude-code
  runtime:
    # Built locally via `make image-runtime-claude-code`.
    image: paddock-runtime-claude-code:dev
  # v0.3: templates declare capability requirements; namespaces grant
  # them via BrokerPolicy (ADR-0014). Before submitting a run against
  # this template, apply a BrokerPolicy in the target namespace:
  # see config/samples/paddock_v1alpha1_brokerpolicy.yaml.
  requires:
    credentials:
      - name: ANTHROPIC_API_KEY
    egress:
      - host: api.anthropic.com
        ports: [443]
      # The harness installs the Claude Code CLI from Anthropic's
      # downloads CDN at startup, so it needs reach to that host.
      - host: downloads.claude.ai
        ports: [443]
  defaults:
    model: claude-sonnet-4-6
    timeout: 30m
    # Claude Code runs can push into the hundreds-of-MB range on real
    # repos; size up generously by default.
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        memory: "2Gi"
  workspace:
    required: true
    mountPath: /workspace
