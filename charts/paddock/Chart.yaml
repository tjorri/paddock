apiVersion: v2
name: paddock
description: Kubernetes-native platform for running headless AI agent harnesses as batch workloads.
type: application
# Chart version and appVersion move in lockstep — one repo, one release.
# Both lines carry a release-please marker so `simple` release-type's
# generic extra-files updater rewrites them on each release PR.
version: 0.5.0 # x-release-please-version
appVersion: "0.5.0" # x-release-please-version
kubeVersion: ">=1.29.0-0"
keywords:
  - paddock
  - ai
  - agents
  - harness
  - kubernetes
home: https://github.com/tjorri/paddock
sources:
  - https://github.com/tjorri/paddock
maintainers:
  - name: Paddock contributors
annotations:
  artifacthub.io/prerelease: "true"
