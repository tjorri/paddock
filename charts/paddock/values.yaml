# Paddock Helm chart values.
#
# Defaults install the controller-manager with the reference images
# built out of this repo. Production installs override image.repository
# + image.tag (and typically collectorImage) to point at a registry.

image:
  repository: paddock-manager
  # When empty, falls back to Chart.AppVersion.
  tag: ""
  pullPolicy: IfNotPresent

# Image the controller injects into every HarnessRun Pod as the
# generic collector sidecar. Versions in lockstep with the manager,
# so the default tag mirrors `image.tag` (empty → Chart.AppVersion).
# Override both when pulling from a private registry.
collectorImage:
  repository: paddock-collector
  tag: ""
  pullPolicy: IfNotPresent

# Broker (v0.3). Separate binary + image; issues credentials to runs
# via the broker-issued model (ADR-0012). Runs in lockstep with the
# manager, so the default tag mirrors `image.tag`.
brokerImage:
  repository: paddock-broker
  tag: ""
  pullPolicy: IfNotPresent

# Egress proxy (v0.3, M4+). Per-run sidecar that terminates TLS with a
# run-scoped MITM CA and blocks unsanctioned destinations (ADR-0013).
# Wired as a controller-manager flag; the reconciler injects the sidecar
# into every run's Pod. Set .repository to "" to disable — runs will
# complete without a proxy and EgressConfigured=False.
proxyImage:
  repository: paddock-proxy
  tag: ""
  pullPolicy: IfNotPresent

# Cooperative-mode egress allow-list applied to every run's proxy
# sidecar via --allow. Empty means deny-all (fail-closed). M7 replaces
# this static list with per-BrokerPolicy grants resolved at runtime.
proxyAllowList: ""

# Transparent-mode init container that installs iptables REDIRECT
# rules in each run's Pod netns (ADR-0013 §7.2). Required for
# hostile-co-tenant posture — the agent cannot bypass the proxy by
# ignoring HTTPS_PROXY. Set .repository to "" to disable transparent
# mode entirely; any BrokerPolicy without spec.interception.cooperativeAccepted
# will then fail its runs closed with InterceptionUnavailable. To permit
# cooperative interception instead, set spec.interception.cooperativeAccepted
# on the governing BrokerPolicy with a written reason.
iptablesInitImage:
  repository: paddock-iptables-init
  tag: ""
  pullPolicy: IfNotPresent

# Image used by the Workspace seed Job to clone repos. Empty falls back
# to the in-source default (digest-pinned alpine/git). Operators may
# override with a digest-pinned reference (image@sha256:...) for
# air-gapped mirrors. Tag-only refs force ImagePullPolicy=Always and
# emit a startup warning. F-49 / ADR-0018.
seedImage: ""

# Per-run NetworkPolicy enforcement (ADR-0013 §7.4). Defence-in-depth
# on top of the proxy sidecar — blocks agent egress that somehow
# bypasses iptables (raw sockets, privileged escapes). Values:
#   on    Always emit a NetworkPolicy per run.
#   off   Never emit.
#   auto  Probe kube-system for a known NP-capable CNI (Calico,
#         Cilium, Weave, kube-router, Antrea). Kind/kindnet resolves
#         to off. Default — safe on any cluster.
proxy:
  networkPolicy:
    enforce: auto

# cert-manager must be installed in the cluster — the webhook Issuer
# and Certificate are rendered unconditionally. Set certManager.skip
# to true to render without cert-manager resources (advanced; BYO
# TLS).
certManager:
  skip: false

replicas: 1

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

# Leader election is on by default. Single-replica deployments still
# benefit from the lease (safe rolling restarts); bump replicas
# separately when you want HA.
leaderElection:
  enabled: true

# Cap on status.recentEvents entries when parsing collector snapshots
# (ADR-0007). Wired through to the manager's --recent-events-cap flag.
recentEventsCap: 50

# Days after which AuditEvents are reaped by the TTL reconciler
# (ADR-0016). Wired through to --audit-retention-days. Lower this if
# etcd pressure is a concern before reaching for external export.
auditRetentionDays: 30

# F-33: the AuditEvent validating webhook ships with failurePolicy=Ignore
# (all other webhooks remain failurePolicy=Fail). This trade-off ensures
# audit-trail availability is not gated on the controller pod's webhook
# handler — broker fail-closed deny semantics (F-12, F-24) would
# otherwise convert any webhook outage into a self-DoS on issuance.
# The cost is that AuditEvent write-once enforcement is briefly bypassed
# during webhook outages; operators detect this via:
#   - paddock_audit_write_failures_total counter (rate > 0 alerts)
#   - controller-pod webhook readiness probes
# See docs/internal/observability/audit-monitoring.md for an alert example.
