spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: broker
      app.kubernetes.io/name: paddock
  template:
    metadata:
      labels:
        app.kubernetes.io/component: broker
        app.kubernetes.io/name: paddock
    spec:
      containers:
        - args:
            - --metrics-bind-address=:8443
            - --listen-address=:8443
            - --health-probe-bind-address=:8081
            - --cert-dir=/etc/paddock-broker/tls
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
          command:
            - /broker
          image: {{ .Values.brokerImage.repository }}:{{ .Values.brokerImage.tag | default .Chart.AppVersion }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 15
            periodSeconds: 20
          name: broker
          ports:
            - containerPort: 8443
              name: https
              protocol: TCP
            - containerPort: 8081
              name: probes
              protocol: TCP
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /etc/paddock-broker/tls
              name: tls-cert
              readOnly: true
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: webhook-certs
              readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: paddock-broker
      terminationGracePeriodSeconds: 10
      volumes:
        - name: tls-cert
          secret:
            defaultMode: 272
            secretName: broker-serving-cert
        - name: webhook-certs
          secret:
            secretName: webhook-server-cert
