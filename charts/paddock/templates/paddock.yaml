---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: paddock
    control-plane: controller-manager
  name: paddock-controller-manager
  namespace: paddock-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paddock
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: paddock
        control-plane: controller-manager
    spec:
      containers:
        - args:
            - --metrics-bind-address=:8443
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --collector-image={{ .Values.collectorImage.repository }}:{{ .Values.collectorImage.tag | default .Chart.AppVersion }}
            - --recent-events-cap={{ .Values.recentEventsCap | default 50 }}
            - --audit-retention-days={{ .Values.auditRetentionDays | default 30 }}
            - --broker-endpoint=https://paddock-broker.paddock-system.svc:8443
            - --broker-token-path=/var/run/secrets/paddock-broker/token
            - --broker-ca-path=/etc/paddock-broker/ca/ca.crt
            - --proxy-image={{ if .Values.proxyImage.repository }}{{ .Values.proxyImage.repository }}:{{ .Values.proxyImage.tag | default .Chart.AppVersion }}{{ end }}
            - --proxy-ca-secret-name=paddock-proxy-ca
            - --proxy-ca-secret-namespace=paddock-system
            - --proxy-allow={{ .Values.proxyAllowList | default "" }}
            - --iptables-init-image={{ if .Values.iptablesInitImage.repository }}{{ .Values.iptablesInitImage.repository }}:{{ .Values.iptablesInitImage.tag | default .Chart.AppVersion }}{{ end }}
            - --networkpolicy-enforce={{ .Values.proxy.networkPolicy.enforce | default "auto" }}
            - --broker-ca-secret-name=broker-serving-cert
            - --broker-ca-secret-namespace=paddock-system
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
          command:
            - /manager
          image: {{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /var/run/secrets/paddock-broker
              name: broker-token
              readOnly: true
            - mountPath: /etc/paddock-broker/ca
              name: broker-ca
              readOnly: true
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: webhook-certs
              readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: paddock-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
        - name: broker-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: paddock-broker
                  expirationSeconds: 3600
                  path: token
        - name: broker-ca
          secret:
            items:
              - key: ca.crt
                path: ca.crt
            optional: true
            secretName: broker-serving-cert
        - name: webhook-certs
          secret:
            secretName: webhook-server-cert
