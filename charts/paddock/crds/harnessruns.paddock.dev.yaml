---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: harnessruns.paddock.dev
spec:
  group: paddock.dev
  names:
    kind: HarnessRun
    listKind: HarnessRunList
    plural: harnessruns
    shortNames:
      - hr
    singular: harnessrun
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .spec.templateRef.name
          name: Template
          type: string
        - jsonPath: .status.workspaceRef
          name: Workspace
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
        - jsonPath: .status.conditions[?(@.type=="BrokerCredentialsReady")].message
          name: Credentials
          type: string
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            HarnessRun is a single invocation of a harness. It materialises into a
            batch/v1 Job with an agent container, an optional adapter sidecar, and
            a collector sidecar. Runs terminate — continuity across follow-up runs
            comes from the shared Workspace, not from long-lived processes.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                HarnessRunSpec is the desired state of a HarnessRun — a single,
                terminating invocation of a harness against an optional workspace.
                The spec is immutable after creation (enforced by the admission webhook):
                to change the configuration of a run, submit a new one.
              properties:
                extraEnv:
                  description: |-
                    ExtraEnv adds env vars to the agent container, merged after the
                    template's defaults and the PADDOCK_* standard variables.
                  items:
                    description: EnvVar represents an environment variable present in a Container.
                    properties:
                      name:
                        description: |-
                          Name of the environment variable.
                          May consist of any printable ASCII characters except '='.
                        type: string
                      value:
                        description: |-
                          Variable references $(VAR_NAME) are expanded
                          using the previously defined environment variables in the container and
                          any service environment variables. If a variable cannot be resolved,
                          the reference in the input string will be unchanged. Double $$ are reduced
                          to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                          "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                          Escaped references will never be expanded, regardless of whether the variable
                          exists or not.
                          Defaults to "".
                        type: string
                      valueFrom:
                        description: Source for the environment variable's value. Cannot be used if value is not empty.
                        properties:
                          configMapKeyRef:
                            description: Selects a key of a ConfigMap.
                            properties:
                              key:
                                description: The key to select.
                                type: string
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                              optional:
                                description: Specify whether the ConfigMap or its key must be defined
                                type: boolean
                            required:
                              - key
                            type: object
                            x-kubernetes-map-type: atomic
                          fieldRef:
                            description: |-
                              Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                              spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                            properties:
                              apiVersion:
                                description: Version of the schema the FieldPath is written in terms of, defaults to "v1".
                                type: string
                              fieldPath:
                                description: Path of the field to select in the specified API version.
                                type: string
                            required:
                              - fieldPath
                            type: object
                            x-kubernetes-map-type: atomic
                          fileKeyRef:
                            description: |-
                              FileKeyRef selects a key of the env file.
                              Requires the EnvFiles feature gate to be enabled.
                            properties:
                              key:
                                description: |-
                                  The key within the env file. An invalid key will prevent the pod from starting.
                                  The keys defined within a source may consist of any printable ASCII characters except '='.
                                  During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                type: string
                              optional:
                                default: false
                                description: |-
                                  Specify whether the file or its key must be defined. If the file or key
                                  does not exist, then the env var is not published.
                                  If optional is set to true and the specified key does not exist,
                                  the environment variable will not be set in the Pod's containers.

                                  If optional is set to false and the specified key does not exist,
                                  an error will be returned during Pod creation.
                                type: boolean
                              path:
                                description: |-
                                  The path within the volume from which to select the file.
                                  Must be relative and may not contain the '..' path or start with '..'.
                                type: string
                              volumeName:
                                description: The name of the volume mount containing the env file.
                                type: string
                            required:
                              - key
                              - path
                              - volumeName
                            type: object
                            x-kubernetes-map-type: atomic
                          resourceFieldRef:
                            description: |-
                              Selects a resource of the container: only resources limits and requests
                              (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                            properties:
                              containerName:
                                description: 'Container name: required for volumes, optional for env vars'
                                type: string
                              divisor:
                                anyOf:
                                  - type: integer
                                  - type: string
                                description: Specifies the output format of the exposed resources, defaults to "1"
                                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                x-kubernetes-int-or-string: true
                              resource:
                                description: 'Required: resource to select'
                                type: string
                            required:
                              - resource
                            type: object
                            x-kubernetes-map-type: atomic
                          secretKeyRef:
                            description: Selects a key of a secret in the pod's namespace
                            properties:
                              key:
                                description: The key of the secret to select from.  Must be a valid secret key.
                                type: string
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                              optional:
                                description: Specify whether the Secret or its key must be defined
                                type: boolean
                            required:
                              - key
                            type: object
                            x-kubernetes-map-type: atomic
                        type: object
                    required:
                      - name
                    type: object
                  type: array
                model:
                  description: |-
                    Model overrides the template's default model (exported as
                    PADDOCK_MODEL).
                  type: string
                prompt:
                  description: |-
                    Prompt is the inline prompt supplied to the agent. Exactly one of
                    Prompt or PromptFrom must be set (enforced by admission webhook).
                    Capped at 256 KiB — use PromptFrom for anything larger.

                    Regardless of source, the controller materialises the prompt into
                    an owned Secret (<run>-prompt, SecretTypeOpaque, key "prompt.txt")
                    and mounts it at /paddock/prompt/prompt.txt. See ADR-0011.
                  type: string
                promptFrom:
                  description: |-
                    PromptFrom sources the prompt from a ConfigMap or Secret. The
                    resolved content is copied into an owned Secret (see Prompt).
                  properties:
                    configMapKeyRef:
                      description: Selects a key from a ConfigMap.
                      properties:
                        key:
                          description: The key to select.
                          type: string
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        optional:
                          description: Specify whether the ConfigMap or its key must be defined
                          type: boolean
                      required:
                        - key
                      type: object
                      x-kubernetes-map-type: atomic
                    secretKeyRef:
                      description: SecretKeySelector selects a key of a Secret.
                      properties:
                        key:
                          description: The key of the secret to select from.  Must be a valid secret key.
                          type: string
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        optional:
                          description: Specify whether the Secret or its key must be defined
                          type: boolean
                      required:
                        - key
                      type: object
                      x-kubernetes-map-type: atomic
                  type: object
                resources:
                  description: Resources override the template's default resource requests/limits.
                  properties:
                    claims:
                      description: |-
                        Claims lists the names of resources, defined in spec.resourceClaims,
                        that are used by this container.

                        This field depends on the
                        DynamicResourceAllocation feature gate.

                        This field is immutable. It can only be set for containers.
                      items:
                        description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                        properties:
                          name:
                            description: |-
                              Name must match the name of one entry in pod.spec.resourceClaims of
                              the Pod where this field is used. It makes that resource available
                              inside a container.
                            type: string
                          request:
                            description: |-
                              Request is the name chosen for a request in the referenced claim.
                              If empty, everything from the claim is made available, otherwise
                              only the result of this request.
                            type: string
                        required:
                          - name
                        type: object
                      type: array
                      x-kubernetes-list-map-keys:
                        - name
                      x-kubernetes-list-type: map
                    limits:
                      additionalProperties:
                        anyOf:
                          - type: integer
                          - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      description: |-
                        Limits describes the maximum amount of compute resources allowed.
                        More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                      type: object
                    requests:
                      additionalProperties:
                        anyOf:
                          - type: integer
                          - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      description: |-
                        Requests describes the minimum amount of compute resources required.
                        If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                        otherwise to an implementation-defined value. Requests cannot exceed Limits.
                        More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                      type: object
                  type: object
                retries:
                  default: 0
                  description: |-
                    Retries is the Job backoffLimit. Defaults to 0 — agent failures do
                    not re-run unless explicitly requested.
                  format: int32
                  maximum: 10
                  minimum: 0
                  type: integer
                templateRef:
                  description: |-
                    TemplateRef identifies which HarnessTemplate or ClusterHarnessTemplate
                    the run uses. Resolution tries namespaced first, then cluster.
                  properties:
                    kind:
                      description: |-
                        Kind restricts resolution. When empty, a namespaced HarnessTemplate
                        with this name is preferred over a cluster one.
                      enum:
                        - HarnessTemplate
                        - ClusterHarnessTemplate
                      type: string
                    name:
                      description: Name of the template.
                      type: string
                  required:
                    - name
                  type: object
                timeout:
                  description: Timeout overrides the template's default timeout.
                  type: string
                ttlSecondsAfterFinished:
                  description: |-
                    TTLSecondsAfterFinished, when set, deletes the HarnessRun that many
                    seconds after its terminal phase is reached. No default — matches
                    the batch/v1 Job convention.
                  format: int32
                  minimum: 0
                  type: integer
                workspaceRef:
                  description: |-
                    WorkspaceRef names the Workspace this run mounts. Required when the
                    resolved template declares workspace.required=true and auto-provision
                    is disabled; otherwise the controller creates an ephemeral Workspace
                    (see ADR-0004).
                  type: string
              required:
                - templateRef
              type: object
            status:
              description: HarnessRunStatus reports the observed state of a HarnessRun.
              properties:
                completionTime:
                  description: CompletionTime is when the run reached a terminal phase.
                  format: date-time
                  type: string
                conditions:
                  description: |-
                    Conditions report typed lifecycle signals. Known types:
                    TemplateResolved, WorkspaceBound, JobCreated, PodReady, Completed.
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                credentials:
                  description: |-
                    Credentials reports, per requires.credentials[*].name, which
                    provider backed it and how the value was delivered. Populated by
                    the controller after a successful Issue call to the broker. Lets
                    the user verify at runtime that the actual delivery matches the
                    policy's declaration.
                  items:
                    description: |-
                      CredentialStatus describes one issued credential from the run's
                      perspective.
                    properties:
                      deliveryMode:
                        description: DeliveryMode is "ProxyInjected" or "InContainer".
                        enum:
                          - ProxyInjected
                          - InContainer
                        type: string
                      hosts:
                        description: |-
                          Hosts lists the destination hostnames this credential substitutes
                          on, for ProxyInjected delivery. Empty for InContainer.
                        items:
                          type: string
                        type: array
                      inContainerReason:
                        description: |-
                          InContainerReason mirrors the policy grant's
                          deliveryMode.inContainer.reason when DeliveryMode is InContainer.
                        type: string
                      name:
                        description: Name matches the template's requires.credentials[*].name.
                        type: string
                      provider:
                        description: |-
                          Provider is the backing provider kind (e.g. "UserSuppliedSecret",
                          "AnthropicAPI"). Copied from the matched grant.
                        type: string
                    required:
                      - deliveryMode
                      - name
                      - provider
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - name
                  x-kubernetes-list-type: map
                jobName:
                  description: JobName is the name of the backing batch/v1 Job, once created.
                  type: string
                networkPolicyEnforced:
                  description: |-
                    NetworkPolicyEnforced records whether per-run NetworkPolicy
                    enforcement was active when this run was admitted. Immutable after
                    admission. The reconciler honours this for the run's lifetime, so a
                    flag flip on the controller-manager
                    (--networkpolicy-enforce=on → off) does not weaken running pods.
                    F-43 / Phase 2d.
                  type: boolean
                observedGeneration:
                  description: ObservedGeneration is the spec generation last reconciled.
                  format: int64
                  type: integer
                outputs:
                  description: Outputs are structured outputs reported by the harness on exit.
                  properties:
                    artifacts:
                      description: Artifacts are additional named outputs (URIs or file paths).
                      items:
                        type: string
                      type: array
                    filesChanged:
                      description: FilesChanged is the count of files modified by the run.
                      format: int32
                      type: integer
                    pullRequests:
                      description: PullRequests opened by the run.
                      items:
                        type: string
                      type: array
                    summary:
                      description: Summary is a human-readable summary of what the run accomplished.
                      type: string
                  type: object
                phase:
                  description: Phase summarises the run's lifecycle in a single token.
                  enum:
                    - Pending
                    - Running
                    - Succeeded
                    - Failed
                    - Cancelled
                  type: string
                recentEvents:
                  description: |-
                    RecentEvents is a ring buffer of the most recent PaddockEvents
                    emitted during the run (capped by controller flag, default 50).
                    Full event history lives on the Workspace PVC at
                    /workspace/.paddock/runs/<name>/events.jsonl.
                  items:
                    description: |-
                      PaddockEvent is a structured event emitted by an adapter sidecar and
                      persisted to the Workspace PVC as events.jsonl. A ring buffer of the
                      most recent events is also surfaced on HarnessRun.status.recentEvents.

                      See docs/adr/0001-paddockevent-schema-version.md for versioning rules.
                    properties:
                      fields:
                        additionalProperties:
                          type: string
                        description: |-
                          Fields carries event-specific details as string-valued key/value
                          pairs. Its schema is determined by Type and SchemaVersion; consumers
                          should tolerate unknown keys.
                        type: object
                      schemaVersion:
                        default: "1"
                        description: |-
                          SchemaVersion governs the semantics of this event. Bump when the
                          semantics of existing fields change; add optional fields without
                          bumping. See ADR-0001.
                        type: string
                      summary:
                        description: |-
                          Summary is a one-line human-readable description of the event.
                          Suitable for display in kubectl output without interpreting the
                          type-specific fields.
                        type: string
                      ts:
                        description: Timestamp is when the event was produced.
                        format: date-time
                        type: string
                      type:
                        description: |-
                          Type identifies the event category. Known types: ToolUse, Message,
                          FileEdit, Commit, Elicitation, Error, Result. Adapters may emit
                          custom types for harness-specific events; consumers should tolerate
                          unknown types.
                        type: string
                    required:
                      - schemaVersion
                      - ts
                      - type
                    type: object
                  type: array
                startTime:
                  description: StartTime is when the run's Job entered Running.
                  format: date-time
                  type: string
                workspaceRef:
                  description: |-
                    WorkspaceRef records which Workspace this run ended up bound to
                    (either user-supplied or ephemerally provisioned).
                  type: string
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
