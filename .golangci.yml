version: "2"
run:
  allow-parallel-runners: true
  # Include files tagged //go:build e2e in every lint pass. Without
  # this, test/e2e/*.go is skipped and drift there hides until a
  # contributor runs `go test -tags=e2e` manually.
  build-tags:
    - e2e
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    # gocyclo is deliberately off. Operator Reconcile functions and
    # stream-JSON adapters legitimately have high cyclomatic complexity
    # (per-phase switches, per-event-type switches). Splitting them
    # just to appease the lint reduces local reasoning — the lint
    # doesn't know the difference between incidental and essential
    # branching.
  settings:
    errcheck:
      # Canonical Go idioms that produce a checkable error which is
      # safe to ignore at the call sites we use them.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
        - (*os.File).Sync
        - (*text/tabwriter.Writer).Flush
    goconst:
      # Default (3) fires on "Error" / "Running" / "Read" — accidental
      # coincidences rather than real knobs. Require a real pattern
      # before suggesting a constant.
      min-occurrences: 5
      min-len: 4
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
      # cmd/* binaries carry flag-description lines (with help strings
      # that legitimately run long) and tests with embedded JSON
      # fixtures that don't line-wrap usefully.
      - linters:
          - lll
          - dupl
        path: cmd/*
      # test/* e2e scaffolding uses long kubectl/helm one-liners that
      # don't split readably.
      - linters:
          - lll
          - dupl
        path: test/*
      # unparam flags test stub callbacks whose error return is
      # mandated by the function signature they're standing in for.
      # The error return is required by the interface contract; the
      # fact that the happy-path test never exercises it isn't
      # something the test itself should fix.
      - linters:
          - unparam
        path: _test\.go$
      # gosec G101: Several constants contain "credential" or token-prefix
      # strings in their identifiers or values:
      #   - api/v1alpha1: AuditKind values like "credential-issued" are
      #     taxonomy labels, not credential values.
      #   - internal/broker/providers: anthropicBearerPrefix /
      #     githubAppBearerPrefix are routing markers for proxy-issued
      #     ephemeral tokens, not real secrets.
      #   - internal/controller/pod_spec.go: brokerTokenMountPath is a
      #     Kubernetes volume mount path, not a credential.
      # gosec matches on the string content; none of these are actual secrets.
      - linters:
          - gosec
        text: "G101"
      # gosec G104: tabwriter.Flush() to a CLI output writer. Identical
      # rationale to the existing errcheck exclusion for fmt.Fprintf —
      # write errors to stdout/stderr in a CLI tool are not actionable and
      # are suppressed by convention throughout the codebase.
      - linters:
          - gosec
        text: "G104"
        path: internal/cli/.*
      # gosec G301/G302/G306: the runtime binaries write event files into
      # a Pod-local workspace directory (/paddock/…). 0o755 dirs and 0o644
      # files are intentional — sibling containers in the same Pod must be
      # able to read the audit trail. Test fakes (fake-claude.sh) need
      # 0o755 to be exec'd. The files are never exposed outside the Pod.
      - linters:
          - gosec
        text: "G30[126]"
        path: cmd/runtime-(claude-code|echo)/.*
      - linters:
          - gosec
        text: "G30[126]"
        path: internal/runtime/proxy/.*
      # gosec G118 / noctx: the runtime binaries' runInteractive spawns
      # a shutdown goroutine that uses context.Background() with a
      # bounded timeout once ctx is already cancelled. Plus the
      # data-reader's per-event turn-complete callback creates its own
      # context.Background() for the broker POST so a slow apiserver
      # cannot stall the transcript pipeline.
      - linters:
          - gosec
          - noctx
        text: "G118|os/exec.Command"
        path: cmd/runtime-(claude-code|echo)/.*
      # gosec G204 / noctx: harness-supervisor spawns the harness CLI
      # whose path comes from the PADDOCK_HARNESS_BIN env var
      # (controller-set on the agent container's Pod spec). Not user
      # input. The subprocess lifetime is owned by ctl messages
      # (interrupt/end), not an HTTP request context — same rationale
      # as the runtime binaries above. noctx also fires on net.Listen
      # for the UDS sockets and net.Dial in tests; the supervisor's
      # listener lifecycle is owned by the run, not an HTTP context.
      - linters:
          - gosec
          - noctx
        text: "G204|os/exec.Command|net\\.Listen|net\\.Dial"
        path: cmd/harness-supervisor/.*
      # noctx: internal/runtime/proxy tests use net.Listen for UDS
      # listeners and httptest.NewRequest for handler unit tests; the
      # production code under test owns its own listener via
      # net.ListenConfig and uses request-scoped contexts.
      - linters:
          - noctx
        text: "net\\.Listen|httptest\\.NewRequest"
        path: internal/runtime/proxy/.*
      # gosec G703: per-prompt driver writes prompt files and events.jsonl
      # under <PADDOCK_WORKSPACE>/.paddock/runs/<run>/. Both env vars are
      # controller-set on the agent container's Pod spec (trusted control
      # plane). gosec's taint analysis treats os.Getenv as user-controlled,
      # which is spurious here — the agent container's environment is
      # under operator control via the HarnessTemplate.
      - linters:
          - gosec
        text: "G703"
        path: cmd/runtime-(claude-code|echo)/.*
      # gosec G304: file paths from variables in these packages come from
      # trusted sources:
      #   - cmd/runtime-*: paths from flags/env set by the controller
      #     in the Pod spec (trusted control plane).
      #   - internal/cli: --prompt-file flag is an intentional user-supplied
      #     file path for a CLI tool; analogous to `cat <file>`.
      #   - internal/controller + internal/proxy (caPath): CA cert paths
      #     from operator configuration, not user input.
      - linters:
          - gosec
        text: "G304"
        path: cmd/runtime-(claude-code|echo)/.*
      - linters:
          - gosec
        text: "G304"
        path: internal/runtime/proxy/.*
      - linters:
          - gosec
        text: "G304"
        path: internal/cli/submit\.go
      - linters:
          - gosec
        text: "G304"
        path: internal/(controller|proxy)/broker_client\.go
      # gosec G304: internal/brokerclient/brokerclient.go reads CA bundle
      # and SA token from paths specified in operator configuration (mounted
      # Secret / projected SA token volumes). Neither path is user-tainted.
      - linters:
          - gosec
        text: "G304"
        path: internal/brokerclient/brokerclient\.go
      # gosec G304: internal/proxy/ca.go reads cert-manager-generated TLS
      # cert + key from paths specified in operator configuration (mounted
      # Secret volume). cmd/proxy reads an optional extra CA bundle from an
      # operator-specified path. Neither path is user-tainted.
      - linters:
          - gosec
        text: "G304"
        path: internal/proxy/ca\.go
      - linters:
          - gosec
        text: "G304"
        path: cmd/proxy/main\.go
      # gosec G204 / noctx: iptables-init invokes a compile-time constant
      # binary ("iptables") with arguments derived from validated config
      # flags. Neither the binary path nor the arguments come from user
      # input. The init container runs to completion so context
      # cancellation via CommandContext is not meaningful here.
      - linters:
          - gosec
          - noctx
        text: "G204|os/exec.Command"
        path: cmd/iptables-init/.*
      # gosec G204: test/utils e2e scaffold invokes "kubectl" (hardcoded)
      # to manage cert-manager during integration tests. These are not
      # production code paths.
      - linters:
          - gosec
        text: "G204"
        path: test/.*
      # gosec G703: BrokerClient reads the projected SA token from a
      # controller-mounted path (TokenPath). gosec's taint analysis treats
      # struct fields as tainted; the path is a fixed Kubernetes volume
      # mount set by the trusted control plane, not user input.
      - linters:
          - gosec
        text: "G703"
        path: internal/proxy/broker_client\.go
      # gosec G704: BrokerClient.Endpoint is operator-supplied via the
      # controller's --broker-endpoint flag, not user input. The HTTP call
      # is to a fixed in-cluster service. The "SSRF via taint analysis"
      # warning is spurious here.
      - linters:
          - gosec
        text: "G704"
        path: internal/proxy/broker_client\.go
      # gosec G704: InteractiveRouter forwards to the runtime sidecar at
      # an address resolved from the run pod's IP via a controller-runtime
      # cache lookup (see cmd/broker/main.go's adapterResolver). Neither
      # the URL host nor the path comes from user input — the resolver
      # only emits "<podIP>:8431" / fixed paths /prompts /interrupt /end.
      - linters:
          - gosec
        text: "G704"
        path: internal/broker/router\.go
      # gosec G103: SO_ORIGINAL_DST recovery requires unsafe.Pointer to
      # pass a *RawSockaddrInet4 to syscall.Syscall6 — the canonical Linux
      # idiom for raw socket-options not exposed by the stdlib syscall
      # wrappers. Audited.
      - linters:
          - gosec
        text: "G103"
        path: internal/proxy/transparent_linux\.go
      # noctx: test/utils e2e helpers call exec.Command without context.
      # These are test-only utilities with no production DoS surface.
      - linters:
          - noctx
        path: test/.*
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
