name: E2E Tests

on:
  # Runs on: PRs only (skipped while in draft), plus workflow_dispatch
  # for manual runs. Direct commits to main don't trigger this — push
  # CI was dropped to keep runner minutes for review-stage feedback.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**"
      - "config/samples/**"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

concurrency:
  group: test-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    # Skip while the PR is in draft. workflow_dispatch always runs.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    # 45 min is head-room above the 32-min go test deadline + 30-min
    # Ginkgo suite deadline in the Makefile. Leaves time for cold
    # GH-runner dep downloads, image builds, and `kind export logs` on
    # failure without clipping the Ginkgo summary.
    timeout-minutes: 45
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      # Pin kind to a tested version; chasing :latest has bitten CI before.
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Run e2e tests
        run: |
          go mod tidy
          make test-e2e

      # When the suite fails, grab every logline Kind has so failures
      # on CI are reproducible without re-running. Artifact retention
      # defaults are fine — M8 diagnostics don't need long-term keep.
      - name: Export Kind cluster logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/kind-logs
          kind export logs /tmp/kind-logs --name paddock-test-e2e || true

      - name: Upload Kind logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: kind-logs
          path: /tmp/kind-logs
          if-no-files-found: ignore
          retention-days: 7
