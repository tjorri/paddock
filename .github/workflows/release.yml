name: release

# Fires when release-please publishes a GitHub Release (merged Release
# PR → tagged → release event). Builds + pushes versioned images, the
# Helm chart as an OCI artifact, and the single-file install.yaml
# attachment. Everything Cosign-signed.
#
# Triggering on `release: published` rather than `push: tags` because:
#   - the release object already exists when this fires, so
#     gh-release uploads never race;
#   - `push: tags` doesn't fire on tags created via the API by the
#     default GITHUB_TOKEN, which is the release-please path.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Defaults to the latest release."
        required: false

permissions:
  contents: write       # upload install.yaml to the release
  packages: write       # ghcr.io push (images + chart)
  id-token: write       # Cosign keyless OIDC

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: paddock-manager
            context: .
            dockerfile: Dockerfile
          - name: paddock-echo
            context: images/harness-echo
            dockerfile: images/harness-echo/Dockerfile
          - name: paddock-adapter-echo
            context: .
            dockerfile: images/adapter-echo/Dockerfile
          - name: paddock-collector
            context: .
            dockerfile: images/collector/Dockerfile
          - name: paddock-claude-code
            context: images/harness-claude-code
            dockerfile: images/harness-claude-code/Dockerfile
          - name: paddock-adapter-claude-code
            context: .
            dockerfile: images/adapter-claude-code/Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          # Semver tags only — skip :latest on purpose (ambiguity
          # between "latest release" and "latest main" costs more
          # than the convenience is worth).
          #   {{version}}           → 0.1.0
          #   v{{version}}          → v0.1.0
          #   {{major}}.{{minor}}   → 0.1
          #   v{{major}}.{{minor}}  → v0.1
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}.{{minor}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        id: build
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign image with Cosign keyless
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}"

  chart:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v3.16.3

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      # cosign reads creds from ~/.docker/config.json when signing by
      # digest against a registry. `helm registry login` (below) writes
      # to Helm's own config, not Docker's — so without this step the
      # Sign-with-Cosign step hits ghcr.io with no token and gets
      # UNAUTHORIZED. The images job has the same login for the same
      # reason.
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp registry paths into values.yaml
        # The chart on disk uses short image names so local Kind
        # installs work without overrides. For the published chart
        # artifact, substitute the fully-qualified ghcr.io paths so
        # consumers who install from the registry don't need --set
        # flags for standard cases.
        run: |
          sed -i.bak \
            -e "s@repository: paddock-manager@repository: ghcr.io/${{ github.repository_owner }}/paddock-manager@" \
            -e "s@repository: paddock-collector@repository: ghcr.io/${{ github.repository_owner }}/paddock-collector@" \
            charts/paddock/values.yaml
          rm -f charts/paddock/values.yaml.bak
          echo "--- published values.yaml ---"
          grep -A1 'repository:' charts/paddock/values.yaml

      - name: helm package + push
        id: push
        run: |
          mkdir -p dist
          helm package charts/paddock --destination dist/
          chart=$(ls dist/paddock-*.tgz | head -1)
          echo "$chart"
          helm registry login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          out=$(helm push "$chart" "oci://ghcr.io/${{ github.repository_owner }}/charts" 2>&1)
          echo "$out"
          # helm push prints "Digest: sha256:…" — capture for cosign.
          digest=$(echo "$out" | awk '/Digest:/ {print $2}')
          echo "digest=$digest" >>"$GITHUB_OUTPUT"

      - name: Sign chart with Cosign keyless
        if: steps.push.outputs.digest != ''
        run: |
          version="${{ github.event.release.tag_name || inputs.tag }}"
          # Chart tags strip the v prefix in OCI.
          chart_tag="${version#v}"
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/charts/paddock@${{ steps.push.outputs.digest }}"
          echo "chart pushed: oci://ghcr.io/${{ github.repository_owner }}/charts/paddock:${chart_tag}"

  installer:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Render single-file installer
        # build-installer uses IMG= to pin the manager image in the
        # manifest. The generated dist/install.yaml is self-contained
        # and applicable via `kubectl apply --server-side=true -f`.
        run: |
          version="${{ github.event.release.tag_name || inputs.tag }}"
          tag_bare="${version#v}"
          make build-installer \
            IMG="ghcr.io/${{ github.repository_owner }}/paddock-manager:${tag_bare}"

      - name: Attach install.yaml to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: dist/install.yaml
          fail_on_unmatched_files: true
