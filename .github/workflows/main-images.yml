name: main-images

# Publishes bleeding-edge images on every push to main. Each image is
# tagged :main (moving) and :main-<short-sha> (immutable, for pinning).
# The Helm chart is NOT published from main — chart publish is release-
# only (see release.yml) to avoid shipping a chart that points at
# images that may not yet exist in the registry.
#
# Multi-arch builds via buildx (linux/amd64 + linux/arm64). All pushed
# images are signed with Cosign keyless (Sigstore) — signatures live
# as sibling OCI artifacts, so `docker pull` works unchanged for
# non-verifying consumers; anyone who cares runs `cosign verify`.

on:
  push:
    branches: [main]
    # Skip this workflow when only docs or samples change — saves a
    # ~5min buildx run for changes that don't affect any image layer.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "config/samples/**"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

# Cancel an in-progress build if a newer push to main arrives —
# saves CI time, and the newer sha wins the :main tag anyway.
concurrency:
  group: main-images
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write # Cosign keyless OIDC

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: paddock-manager
            context: .
            dockerfile: Dockerfile
          - name: paddock-echo
            context: .
            dockerfile: images/harness-echo/Dockerfile
          - name: paddock-runtime-echo
            context: .
            dockerfile: images/runtime-echo/Dockerfile
          - name: paddock-claude-code
            context: .
            dockerfile: images/harness-claude-code/Dockerfile
          - name: paddock-runtime-claude-code
            context: .
            dockerfile: images/runtime-claude-code/Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          # :main — moving tag for "whatever is on HEAD of main"
          # :main-<sha> — immutable, for anyone wanting to pin a specific
          #   main-branch commit without a formal release
          tags: |
            type=raw,value=main
            type=sha,prefix=main-,format=short

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        id: build
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign image with Cosign keyless
        # cosign signs the image by digest, which is stable across
        # tags — one signature covers every tag that resolves to the
        # same manifest. --yes skips the interactive confirmation.
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}"
