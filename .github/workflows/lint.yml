name: Lint

on:
  # Runs on: direct commits to main, and PRs (any branch). Same-repo
  # feature branches without a PR don't CI by design — the PR trigger
  # covers them as soon as a PR is opened, and running CI on every
  # WIP push to a not-yet-PR'd branch is wasteful. Doc-only changes
  # are skipped to save ~3 min per README/ADR commit.
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**"
      - "config/samples/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**"
      - "config/samples/**"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

# Cancel in-flight lint when a newer commit lands. Double-pushes
# currently let two runs drag to completion; the older one's result
# is stale anyway.
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
