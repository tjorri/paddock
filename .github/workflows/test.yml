name: Tests

on:
  # Runs on: direct commits to main, and PRs (any branch).
  # Same-repo feature branches without a PR don't CI — open a PR or
  # use workflow_dispatch if you need CI there.
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**"
      - "config/samples/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**"
      - "config/samples/**"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Running Tests
        run: |
          go mod tidy
          make test
